<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Function Tests</title>
  </head>
  <body>
    <script>
      function fun1() {
        return 1;
      }

      function test(value) {
        document.writeln(value);
        document.writeln("<br>");
      }

      test(fun1() === 1);
      document.writeln("<br>");
      test(fun1(42) === 1);
      document.writeln("<br>");
      test(fun1(52, true, "as") === 1);
      document.writeln("<br>");

      function fun2() {
        return 1;
      }
      function fun2(arg) {
        return arg;
      }

      // document.writeln(fun2() === 1); // ist false weil die zweite Definition von fun2 die erste überschreibt.
      // es kommt undifined dabei raus, weil ja kein Argument mitgegeben wird, dass dann returnier wird.
      document.writeln(fun2() !== 1);
      document.writeln("<br>");
      document.writeln(fun2() === undefined);
      document.writeln("<br>");
      document.writeln(fun2(42) === 42);
      document.writeln("<br>");

      function noReturn() {
        1;
      } // retuniert undifined
      const noReturn2 = () => {
        1;
      }; // codeblock mit geschweiften klammern braucht immer einen return statement
      const noReturn3 = () => 1; // ohne geschweifte klammern wird automatisch der Ausdruck nach dem Pfeil returniert

      document.writeln(noReturn() !== 1);
      document.writeln("<br>");
      document.writeln(noReturn2() !== 1);
      document.writeln("<br>");
      document.writeln(noReturn3() === 1);
      document.writeln("<br>");

      const myfun = fun1;
      const funs = [null, undefined, fun1, fun2];

      document.writeln(myfun() === 1); // immer wenn in JS () steht muss linkt davon etwas sein, dass vom typ funktion ist.
      document.writeln("<br>");
      document.writeln(funs[2]() === 1);
      document.writeln("<br>");

      function doit(whatToDo) {
        return function bla(arg) {
          return whatToDo(arg);
        };
      }
      // --> umgeschrieben mit arrow function
      //   const doit = (whatToDo) => (arg) => whatToDo(arg);

      document.writeln(doit(fun1)(10) === 1);
      document.writeln("<br>");
      document.writeln(doit(fun2)(10) === 10);

      // curried style
      const doit2 = (callme) => (arg) => callme(arg);

      document.writeln(doit2(fun1)(10) === 1);

      const doFun2 = doit2(fun1);

      document.writeln(doFun2(10) === 1);
      document.writeln(doFun2() === 1);

      document.writeln("<br>");
      document.writeln("---------------");
      document.writeln("<br>");

      const plus = (x) => (y) => x + y;
      const x = Math.random();
      const y = Math.random();
      const plus3 = plus(3);
      test(plus(x)(y) === x + y);
      test(plus3(y) === 3 + y);
    </script>
  </body>
</html>
